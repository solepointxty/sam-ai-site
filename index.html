<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sam AI</title>

<style>
:root {
    --bg: #05060a;
    --accent: #00f2ff;
}

body {
    margin: 0;
    background: radial-gradient(circle at center, #0a0f1f, #000);
    color: white;
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
}

/* AVATAR */
.avatar {
    margin: auto;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px solid var(--accent);
    display: flex;
    justify-content: center;
    align-items: center;
    box-shadow: 0 0 40px var(--accent);
    transition: 0.3s;
}

.inner {
    width: 80px;
    height: 80px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
}

.listening .inner {
    background: #ff00ff;
    animation: pulse 0.4s infinite;
}

.speaking {
    transform: scale(1.1);
}

@keyframes pulse {
    0% {transform: scale(0.9);}
    50% {transform: scale(1.1);}
    100% {transform: scale(0.9);}
}

/* TEXT */
#response {
    text-align: center;
    max-width: 600px;
    margin: 20px auto;
    opacity: 0.9;
}

/* INPUT */
.controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 20px;
}

input {
    padding: 15px;
    width: 50%;
    border-radius: 30px;
    border: none;
}

button {
    border: none;
    border-radius: 50%;
    padding: 12px;
    cursor: pointer;
    background: var(--accent);
}

</style>
</head>

<body>

<div class="avatar" id="avatar">
    <div class="inner"></div>
</div>

<div id="response">
Hey, I’m Sam. Talk or type — I got you.
</div>

<div class="controls">
    <input id="input" placeholder="Ask something..." />
    <button onclick="send()">➤</button>
    <button onclick="toggleMic()">🎤</button>
    <button onclick="toggleVoice()">🔊</button>
</div>

<script type="module">
import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

const API_KEY = "YOUR_NEW_API_KEY_HERE";

const genAI = new GoogleGenerativeAI(API_KEY);
const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });

const input = document.getElementById("input");
const responseBox = document.getElementById("response");
const avatar = document.getElementById("avatar");

const synth = window.speechSynthesis;
let muted = false;

/* SEND MESSAGE */
async function send(textInput) {
    const text = textInput || input.value.trim();
    if (!text) return;

    input.value = "";
    responseBox.innerText = "...";
    avatar.classList.add("listening");

    try {
        const result = await model.generateContent(
            "You are Sam, a confident Shopify expert. Be casual and helpful.\nUser: " + text
        );

        const res = await result.response;
        const reply = res.text();

        avatar.classList.remove("listening");
        avatar.classList.add("speaking");

        typeText(reply);
        speak(reply);

    } catch (err) {
        console.error(err);
        responseBox.innerText = "Something broke.";
        avatar.classList.remove("listening");
    }
}

/* TYPING EFFECT */
function typeText(text) {
    responseBox.innerText = "";
    let i = 0;

    const interval = setInterval(() => {
        responseBox.innerText += text.charAt(i);
        i++;
        if (i >= text.length) clearInterval(interval);
    }, 15);
}

/* VOICE */
function speak(text) {
    if (muted) return;

    synth.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1;
    utter.pitch = 1;
    utter.lang = "en-US";

    utter.onend = () => {
        avatar.classList.remove("speaking");
    };

    synth.speak(utter);
}

function toggleVoice() {
    muted = !muted;
    alert(muted ? "Voice off" : "Voice on");
}

/* MIC INPUT */
let recognition;
function toggleMic() {
    if (!('webkitSpeechRecognition' in window)) {
        alert("Mic not supported");
        return;
    }

    if (!recognition) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = false;
        recognition.lang = "en-US";

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            send(transcript);
        };

        recognition.onstart = () => {
            avatar.classList.add("listening");
        };

        recognition.onend = () => {
            avatar.classList.remove("listening");
        };
    }

    recognition.start();
}

/* ENTER KEY */
input.addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});
</script>

</body>
</html>
